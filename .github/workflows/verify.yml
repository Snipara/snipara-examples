name: Verify public evidence

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify benchmark results
        run: python3 benchmarks/hosted-context-2026-06/verify_results.py
      - name: Run tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
